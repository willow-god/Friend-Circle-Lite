# 爬虫相关配置
# 解释：使用request实现友链文章爬取，并放置到根目录的all.json下
#   enable:             是否启用爬虫
#   json_url:           请填写对应格式json的地址，仅支持网络地址
#   article_count:      请填写每个博客需要获取的最大文章数量
spider_settings:
  enable: true
  json_url: "https://mingcy.cn/js/friend.json"
  article_count: 5

# 数据合并配置
# 解释：合并多个数据源的结果，比如国内和国外执行结果，解决部分网站访问受限问题
#   enable:                 是否启用数据合并功能
#   remote_base_url:        远程数据源的基础 URL，会自动拼接 /all.json、/link.json、/errors.json
#   merge_article_data:     是否合并友圈文章数据（all.json）
#   merge_link_check_data:  是否合并友链可达性数据（link.json），如果远程没有此文件会自动跳过
merge_settings:
  enable: false
  remote_base_url: "https://fc.liushen.fun"
  merge_article_data: true
  merge_link_check_data: true

# 友链可达性检测配置
# 解释：先检查友链站点是否可达，再决定是否继续抓取该站点 RSS，检测结果会写入 all.json 供前端展示
#   enable:                是否启用友链可达性检测
#   max_age_hours:         同一友链检测结果缓存时间，默认 24 小时
#   timeout:               单次请求超时时间
#   max_workers:           并发检测数量
#   proxy_url:             可选代理前缀，比如 Cloudflare Worker 转发地址，留空则不启用
#   status_api_url:        兜底状态码 API，API-only 结果只用于可达性展示，不参与 RSS 抓取
#   enable_backlink_check: 是否检测友链页是否包含你的站点链接
#   author_url:            你的站点域名，用于反链检测，建议只填写域名
link_check:
  enable: true
  max_age_hours: 24
  timeout: 15
  max_workers: 10
  proxy_url: ""
  status_api_url: "https://v2.xxapi.cn/api/status?url={url}"
  enable_backlink_check: true
  author_url: "mingcy.cn"

# 邮箱推送功能配置，暂未实现，等待后续开发
# 解释：每天为指定邮箱推送所有友链文章的更新，仅能指定一个
#   enable:             是否启用邮箱推送功能
#   to_email:           收件人邮箱地址
#   subject:            邮件主题
#   body_template:      邮件正文的 HTML 模板文件
email_push:
  enable: false
  to_email: recipient@example.com
  subject: "今天的 RSS 订阅更新"
  body_template: "rss_template.html"

# 邮箱issue订阅功能配置
# 解释：向在issue中提取的所有邮箱推送您网站中的更新，添加邮箱和删除邮箱均通过添加issue对应格式实现
#   enable:             是否启用邮箱推送功能
#   github_username:    GitHub 用户名，用于构建issue api地址
#   github_repo:        GitHub 仓库名，用于构建issue api地址
#   your_blog_url:      你的博客地址
#   website_info:       你的博客信息
#     title:            你的博客标题，如果启用了推送，用于生成邮件主题
rss_subscribe:
  enable: true
  github_username: willow-god
  github_repo: Friend-Circle-Lite
  your_blog_url: https://blog.liushen.fun/
  email_template: "./push_templates/default.html"
  website_info:
    title: "清羽飞扬"

# SMTP 配置
# 解释：使用其中的相关配置实现上面两种功能，若无推送要求可以不配置，请将以上两个配置置为false
#   email:              发件人邮箱地址
#   server：            SMTP 服务器地址
#   port：              SMTP 端口号
#   use_tls：           是否使用 tls 加密
smtp:
  email: notify@liushen.fun
  server: smtp.exmail.qq.com
  port: 465
  use_tls: true

# 特殊RSS地址指定，可以置空但是不要删除！
# 解释：用于指定特殊RSS地址，如B站专栏等不常见RSS地址后缀，可以添加多个
#   name:               友链名称
#   url:                指定的RSS地址
specific_RSS:
   - name: "阮一峰"
     url: "http://feeds.feedburner.com/ruanyifeng"
